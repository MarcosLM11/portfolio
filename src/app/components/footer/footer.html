<footer
  style="
    border-top: 1px solid rgba(28, 24, 48, 0.08);
    padding: 2rem 1.5rem;
    background: rgba(255, 255, 255, 0.3);
  "
>
  <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
    <p
      style="
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(28, 24, 48, 0.32);
      "
    >
      © {{ year }} Marcos — Built with Angular
    </p>

    <div class="flex items-center gap-6">
      @for (link of socialLinks; track link.label) {
        <a
          [href]="link.href"
          target="_blank"
          rel="noopener noreferrer"
          style="
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(28, 24, 48, 0.32);
            text-decoration: none;
            transition: color 0.2s ease;
          "
          onmouseover="this.style.color = '#6b5ce7'"
          onmouseout="this.style.color = 'rgba(28,24,48,0.32)'"
        >
          {{ link.label }}
        </a>
      }
    </div>
  </div>
</footer>
