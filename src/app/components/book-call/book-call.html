<div class="bc-wrapper" [class.open]="svc.isOpen()">
  <!-- Backdrop -->
  <div
    class="bc-backdrop"
    role="button"
    tabindex="0"
    aria-label="Close"
    (click)="svc.close()"
    (keyup.enter)="svc.close()"
    (keyup.space)="svc.close()"
  ></div>

  <!-- Floating card -->
  <div
    class="bc-card"
    role="dialog"
    aria-modal="true"
    aria-label="Get in touch"
    (click)="$event.stopPropagation()"
    (keydown)="$event.stopPropagation()"
  >
    <!-- Close — plain X, top right -->
    <button class="bc-close" (click)="svc.close()" aria-label="Close">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>

    <!-- Header -->
    <p class="bc-eyebrow">Get in touch</p>
    <h2 class="bc-title">Let's connect</h2>

    <!-- Actions -->
    <div class="bc-actions">
      <!-- Book a call -->
      <a href="#" class="bc-action-row" target="_blank" rel="noopener noreferrer">
        <span class="bc-action-icon">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
            <line x1="16" x2="16" y1="2" y2="6" />
            <line x1="8" x2="8" y1="2" y2="6" />
            <line x1="3" x2="21" y1="10" y2="10" />
          </svg>
        </span>
        <span class="bc-action-body">
          <span class="bc-action-title">Book a Call</span>
          <span class="bc-action-hint">Schedule a 30-min video call</span>
        </span>
        <svg
          class="bc-action-arrow"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      </a>

      <!-- Send email via Gmail -->
      <button class="bc-action-row" (click)="openGmail()">
        <span class="bc-action-icon">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect width="20" height="16" x="2" y="4" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
        </span>
        <span class="bc-action-body">
          <span class="bc-action-title">Send an Email</span>
          <span class="bc-action-hint">Opens Gmail in a new tab</span>
        </span>
        <svg
          class="bc-action-arrow"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      </button>
    </div>

    <!-- Copy email row -->
    <div class="bc-email-row">
      <span class="bc-email-address">{{ email }}</span>
      <button
        class="bc-copy-btn"
        (click)="copyEmail()"
        [attr.aria-label]="emailCopied() ? 'Copied!' : 'Copy email'"
      >
        @if (emailCopied()) {
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
        } @else {
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
          </svg>
        }
        <span>{{ emailCopied() ? 'Copied!' : 'Copy' }}</span>
      </button>
    </div>

    <!-- Social links -->
    <div class="bc-socials">
      <a
        [href]="githubUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="bc-social-btn"
        aria-label="GitHub"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
          />
        </svg>
        <span>GitHub</span>
      </a>
      <a
        [href]="linkedinUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="bc-social-btn"
        aria-label="LinkedIn"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
          />
          <rect x="2" y="9" width="4" height="12" />
          <circle cx="4" cy="4" r="2" />
        </svg>
        <span>LinkedIn</span>
      </a>
      <a [href]="'mailto:' + email" class="bc-social-btn" aria-label="Email">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
        <span>Email</span>
      </a>
    </div>
  </div>
</div>
