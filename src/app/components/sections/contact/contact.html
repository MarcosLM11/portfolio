<section id="contact" class="explore-section">
  <div class="explore-inner">
    <h2 class="explore-title">More to <span class="explore-highlight">Explore</span></h2>
    <p class="explore-subtitle">Check out these additional resources and connect with me</p>

    <div class="explore-grid">
      @for (card of cards; track card.title) {
        <a
          [routerLink]="card.route ?? null"
          [attr.href]="card.route ? null : card.href"
          [attr.target]="card.route ? null : '_self'"
          class="explore-card"
          [style.--card-color]="card.color"
        >
          <div class="explore-icon-wrap">
            @switch (card.icon) {
              @case ('book') {
                <svg
                  width="28"
                  height="28"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                </svg>
              }
              @case ('trophy') {
                <svg
                  width="28"
                  height="28"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                  <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                  <path d="M4 22h16" />
                  <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
                  <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
                  <path d="M18 2H6v7a6 6 0 0 0 12 0V2z" />
                </svg>
              }
              @case ('link') {
                <svg
                  width="28"
                  height="28"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M9 17H7A5 5 0 0 1 7 7h2" />
                  <path d="M15 7h2a5 5 0 1 1 0 10h-2" />
                  <line x1="8" x2="16" y1="12" y2="12" />
                </svg>
              }
            }
          </div>

          <h3 class="explore-card-title">{{ card.title }}</h3>
          <p class="explore-card-desc">{{ card.description }}</p>
          <span class="explore-card-cta">Explore →</span>
        </a>
      }
    </div>
  </div>
</section>
