<section id="hero" class="relative min-h-screen flex flex-col justify-center overflow-hidden px-6">
  <!-- Subtle radial glow behind name -->
  <div
    class="absolute inset-0 pointer-events-none"
    aria-hidden="true"
    style="
      background: radial-gradient(
        ellipse 60% 50% at 40% 50%,
        rgba(107, 92, 231, 0.08),
        transparent
      );
    "
  ></div>

  <div class="relative max-w-6xl mx-auto w-full pt-28 pb-20">
    <!-- Eyebrow -->
    <div class="hero-label flex items-center gap-3 mb-10">
      <span style="display: block; width: 2rem; height: 1px; background: #6b5ce7"></span>
      <span
        style="
          font-family: 'Space Mono', monospace;
          font-size: 0.65rem;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: #6b5ce7;
        "
      >
        Full-Stack Software Engineer
      </span>
    </div>

    <!-- Name -->
    <h1
      class="hero-name"
      style="
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.03em;
        color: #1c1830;
        font-size: clamp(4rem, 11vw, 9.5rem);
        margin-bottom: 1.75rem;
      "
    >
      Marcos<br />
      <span style="color: #6b5ce7">García.</span>
    </h1>

    <!-- Tagline -->
    <p
      class="hero-tagline"
      style="
        font-family: 'Syne', sans-serif;
        font-size: clamp(1rem, 2.2vw, 1.35rem);
        color: rgba(28, 24, 48, 0.52);
        max-width: 36rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      "
    >
      Building thoughtful digital experiences —<br class="hidden sm:block" />
      from architecture to pixel.
    </p>

    <!-- Terminal prompt -->
    <div class="hero-prompt flex items-center gap-2 mb-14">
      <span
        style="
          font-family: 'Space Mono', monospace;
          font-size: 0.8rem;
          color: rgba(28, 24, 48, 0.28);
        "
        >~/portfolio</span
      >
      <span style="font-family: 'Space Mono', monospace; font-size: 0.8rem; color: #6b5ce7">$</span>
      <span
        style="
          font-family: 'Space Mono', monospace;
          font-size: 0.8rem;
          color: rgba(28, 24, 48, 0.4);
        "
        >open --work</span
      >
      <span
        class="cursor-blink inline-block"
        style="
          width: 8px;
          height: 14px;
          background: #6b5ce7;
          vertical-align: middle;
          margin-left: 2px;
        "
      ></span>
    </div>

    <!-- CTAs -->
    <div class="hero-cta flex flex-wrap gap-4">
      <button class="btn-primary" (click)="scrollTo('projects')">
        View My Work
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </button>
      <button class="btn-outline" (click)="scrollTo('contact')">Get in Touch</button>
    </div>

    <!-- Scroll indicator -->
    <div class="hero-scroll absolute bottom-8 left-6 flex flex-col items-center gap-2">
      <span
        style="
          font-family: 'Space Mono', monospace;
          font-size: 0.6rem;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: rgba(28, 24, 48, 0.25);
          writing-mode: vertical-rl;
          transform: rotate(180deg);
        "
      >
        scroll
      </span>
      <div
        style="
          width: 1px;
          height: 3rem;
          background: linear-gradient(rgba(107, 92, 231, 0.5), transparent);
        "
      ></div>
    </div>
  </div>
</section>
