<section id="home" class="home-section">
  <div class="home-inner">
    <!-- Avatar -->
    <div class="home-avatar" aria-hidden="true">
      <img src="Portfolio-icon.svg" alt="" width="40" height="40" />
    </div>

    <!-- Title -->
    <h1 class="home-title">Hi, I'm <span class="home-name">Marcos López Marín</span></h1>

    <!-- Chat card -->
    <div class="chat-card">
      <!-- Messages area -->
      <div class="chat-messages" #messagesContainer>
        @if (messages().length === 0 && !loading()) {
          <p class="chat-empty">Ask me anything about Marcos...</p>
        }

        @for (msg of messages(); track $index) {
          <div
            class="chat-message"
            [class.user]="msg.role === 'user'"
            [class.assistant]="msg.role === 'assistant'"
          >
            <div class="chat-bubble">{{ msg.content }}</div>
          </div>
        }

        @if (loading()) {
          <div class="chat-message assistant">
            <div class="chat-bubble typing"><span></span><span></span><span></span></div>
          </div>
        }
      </div>

      <!-- Suggestion chips -->
      <div class="chat-suggestions">
        @for (s of suggestions; track s) {
          <button class="suggestion-chip" (click)="send(s)" [disabled]="loading()">
            {{ s }}
          </button>
        }
      </div>

      <!-- Input row -->
      <div class="chat-input-row">
        <input
          class="chat-input"
          type="text"
          [(ngModel)]="inputValue"
          (keydown.enter)="send()"
          placeholder="Ask anything about Marcos..."
          [disabled]="loading()"
          autocomplete="off"
        />
        <button
          class="chat-send"
          (click)="send()"
          [disabled]="loading() || !inputValue.trim()"
          aria-label="Send"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M22 2L11 13" />
            <path d="M22 2L15 22l-4-9-9-4 20-7z" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
