<header class="header">
  <div class="header-inner">
    <!-- Theme toggle: absolute left -->
    <div class="header-left">
      <button class="theme-toggle" (click)="toggleTheme()" aria-label="Toggle theme">
        <span
          class="theme-icon-slot moon"
          [style.opacity]="isDark() ? 1 : 0"
          [style.transform]="isDark() ? 'none' : 'scale(0) rotate(180deg)'"
        >
          <!-- Moon icon -->
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </span>
        <span
          class="theme-icon-slot sun"
          [style.opacity]="isDark() ? 0 : 1"
          [style.transform]="isDark() ? 'scale(0) rotate(180deg)' : 'none'"
        >
          <!-- Sun icon -->
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
          </svg>
        </span>
      </button>
    </div>

    <!-- Desktop: pill nav centrado -->
    <nav class="pill-nav desktop-nav">
      @for (link of navLinks; track link.id) {
        <button
          class="pill-item"
          [class.active]="activeSection() === link.id"
          (click)="scrollTo(link.id)"
        >
          @if (activeSection() === link.id) {
            <span class="pill-item-bg"></span>
          }
          <span class="pill-item-label">{{ link.label }}</span>
        </button>
      }
    </nav>

    <!-- Mobile: botón hamburguesa centrado -->
    <button
      class="menu-btn mobile-nav"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Menú"
    >
      @if (menuOpen()) {
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      } @else {
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="4" y1="8" x2="20" y2="8" />
          <line x1="4" y1="16" x2="20" y2="16" />
        </svg>
      }
    </button>

    <!-- Book a Call: absolute right -->
    <div class="header-right">
      <button class="book-btn" (click)="bookCallService.open()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
          <line x1="16" x2="16" y1="2" y2="6" />
          <line x1="8" x2="8" y1="2" y2="6" />
          <line x1="3" x2="21" y1="10" y2="10" />
        </svg>
        <span class="book-label">Book a Call</span>
      </button>
    </div>
  </div>

  <!-- Mobile dropdown -->
  @if (menuOpen()) {
    <div class="mobile-menu">
      @for (link of navLinks; track link.id) {
        <button
          class="mobile-menu-item"
          [class.active]="activeSection() === link.id"
          (click)="scrollTo(link.id)"
        >
          {{ link.label }}
        </button>
      }
    </div>
  }
</header>
